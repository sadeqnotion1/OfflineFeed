[Server]
hostname = "127.0.0.1:8081"
title = "nitter"
address = "0.0.0.0"
port = 8080
https = false
httpMaxConnections = 100
staticDir = "./public"

[Cache]
listMinutes = 240
# rssMinutes must be >= OfflineFeed refresh interval (15 minutes)
rssMinutes = 15
redisHost = "nitter-redis"
redisPort = 6379
redisPassword = ""
redisConnections = 20
redisMaxConnections = 30

[Config]
# Change this to any random string before going to production
hmacKey = "CHANGE_ME_TO_A_RANDOM_STRING"
base64Media = false
enableRSS = true
enableDebug = false
proxy = ""
proxyAuth = ""
sessionFile = "sessions.jsonl"
cookieHeader = ""

[Preferences]
theme = "Nitter"
replaceTwitter = ""
replaceYouTube = ""
replaceReddit = ""
proxyVideos = true
hlsPlayback = false
infiniteScroll = false
